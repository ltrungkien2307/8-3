<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Chúc Mừng 8/3 💕</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-touch-callout: none; }
html,body { 
    width:100%; height:100%; overflow:hidden; background:#000; 
    touch-action:none; -webkit-tap-highlight-color:transparent;
    position: fixed;
}
#canvas { position:fixed; top:0; left:0; width:100%; height:100%; display:block; z-index: 1; }
#threeCanvas { position:fixed; top:0; left:0; width:100%; height:100%; display:none; pointer-events:auto; z-index: 2; }
#dustCanvas { position:fixed; top:0; left:0; width:100%; height:100%; display:none; pointer-events:none; z-index: 3; }

#holdBtn {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  z-index:100; display:flex; flex-direction:column; align-items:center; gap:20px;
  cursor:pointer; user-select:none; -webkit-user-select:none;
}
.ring-wrap { position:relative; width:130px; height:130px; }
.ring-bg {
  position:absolute; top:0; left:0; width:100%; height:100%;
  border-radius:50%; background:rgba(255,105,180,0.08);
  border:2px solid rgba(255,105,180,0.3);
}
#holdBtn svg { position:absolute; top:0; left:0; width:130px; height:130px; transform:rotate(-90deg); }
#holdBtn circle.progress {
  fill:none; stroke:#ff69b4; stroke-width:4; stroke-linecap:round;
  stroke-dasharray:377; stroke-dashoffset:377;
  filter:drop-shadow(0 0 8px #ff69b4);
}
.inner-btn {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:92px; height:92px; border-radius:50%;
  background:radial-gradient(circle,rgba(255,105,180,0.35),rgba(255,20,147,0.1));
  border:1px solid rgba(255,105,180,0.5);
  display:flex; align-items:center; justify-content:center; font-size:32px;
  box-shadow:0 0 30px rgba(255,105,180,0.5),inset 0 0 20px rgba(255,105,180,0.1);
  animation:pulse-btn 2s ease-in-out infinite;
}
@keyframes pulse-btn {
  0%,100%{box-shadow:0 0 20px rgba(255,105,180,0.4),inset 0 0 20px rgba(255,105,180,0.1)}
  50%{box-shadow:0 0 50px rgba(255,105,180,0.9),inset 0 0 30px rgba(255,105,180,0.25)}
}
.btn-label { color:rgba(255,182,193,0.9); font-size:13px; letter-spacing:2.5px; text-align:center; text-shadow:0 0 12px rgba(255,105,180,0.6); }

.hint {
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
  color:rgba(255,182,193,0.8); font-size:12px; letter-spacing:2px;
  z-index:50; display:none; text-shadow:0 0 10px rgba(255,105,180,0.5);
  text-align:center; width:90%;
  animation:blink 1.6s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:0.35} 50%{opacity:1} }

#letterIcon {
  position:fixed; bottom:40px; right:28px; z-index:200;
  display:none; cursor:pointer;
  animation:floatY 2s ease-in-out infinite;
}
@keyframes floatY { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-10px) scale(1.06)} }
.env-wrap { width:60px; height:46px; position:relative; }
.env-body { width:60px; height:46px; background:linear-gradient(135deg,#ff8fab,#ff69b4); border-radius:5px; box-shadow:0 0 28px rgba(255,105,180,0.8),0 0 55px rgba(255,105,180,0.3); }
.env-flap { position:absolute; top:0; left:0; width:0; height:0; border-left:30px solid transparent; border-right:30px solid transparent; border-top:20px solid #ff4d94; }
.env-btm { position:absolute; bottom:0; left:0; width:0; height:0; border-left:30px solid transparent; border-right:30px solid transparent; border-bottom:22px solid rgba(255,77,148,0.7); }
.env-l { position:absolute; top:0; left:0; width:0; height:0; border-left:27px solid rgba(255,60,130,0.45); border-top:46px solid transparent; }
.env-r { position:absolute; top:0; right:0; width:0; height:0; border-right:27px solid rgba(255,60,130,0.45); border-top:46px solid transparent; }
#letterIcon span { display:block; text-align:center; color:rgba(255,182,193,0.95); font-size:11px; margin-top:7px; letter-spacing:1px; text-shadow:0 0 10px rgba(255,105,180,0.9); }

#letterModal {
  position:fixed; top:0; left:0; width:100%; height:100%;
  z-index:300; display:none; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.75); backdrop-filter:blur(6px);
}
#letterModal.show { display:flex; }
.letter-paper {
  width:min(88vw,380px);
  background:linear-gradient(160deg,#fff5f8,#ffe4ef);
  border-radius:14px; padding:38px 30px 34px;
  box-shadow:0 0 80px rgba(255,105,180,0.6),0 20px 60px rgba(0,0,0,0.5);
  border:1px solid rgba(255,105,180,0.4);
  position:relative; overflow:hidden;
  transform:scale(0) rotateX(40deg); transform-origin:bottom center;
}
.letter-paper::before {
  content:''; position:absolute; top:0; left:0; width:100%; height:100%;
  background:repeating-linear-gradient(transparent,transparent 27px,rgba(255,150,180,0.15) 28px);
  pointer-events:none;
}
.ltr-title { font-size:20px; color:#c94f7c; text-align:center; margin-bottom:16px; font-style:italic; }
.ltr-body { font-size:14px; line-height:2; color:#7a3050; text-align:center; }
.ltr-sign { margin-top:20px; text-align:right; font-style:italic; color:#c94f7c; font-size:13px; }
.ltr-hearts { text-align:center; font-size:20px; margin:12px 0; letter-spacing:6px; }
.ltr-close { position:absolute; top:12px; right:14px; background:none; border:none; color:#c94f7c; font-size:20px; cursor:pointer; }

#dateBadge {
  position:fixed; top:20px; left:50%; transform:translateX(-50%);
  z-index:50; color:rgba(255,182,193,0.6); font-size:11px; letter-spacing:4px;
  display:none; opacity:0; text-shadow:0 0 10px rgba(255,105,180,0.4);
}

#musicBtn {
  position:fixed; top:18px; right:20px; z-index:500;
  width:38px; height:38px; border-radius:50%;
  background:rgba(255,105,180,0.15);
  border:1px solid rgba(255,105,180,0.45);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:16px;
  box-shadow:0 0 14px rgba(255,105,180,0.3);
  transition:background .3s, box-shadow .3s;
  backdrop-filter:blur(4px);
}
#musicBtn:hover { background:rgba(255,105,180,0.28); box-shadow:0 0 24px rgba(255,105,180,0.5); }
#musicBtn.muted { opacity:.5; }
@keyframes spin-note { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
#musicBtn.playing .note { display:inline-block; animation:spin-note 2s linear infinite; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<canvas id="threeCanvas"></canvas>
<canvas id="dustCanvas"></canvas>
<div id="musicBtn" title="Nhạc nền"><span class="note">🎵</span></div>

<div id="holdBtn">
  <div class="ring-wrap">
    <div class="ring-bg"></div>
    <svg viewBox="0 0 130 130">
      <circle class="progress" cx="65" cy="65" r="60"/>
    </svg>
    <div class="inner-btn">💗</div>
  </div>
  <div class="btn-label">ẤN GIỮ ĐỂ BẮT ĐẦU</div>
</div>

<div id="dateBadge"></div>
<div id="hintSphere" class="hint">Chạm vào quả cầu</div>
<div id="hintDrag"   class="hint">Thử xoay nó đi</div>

<div id="letterIcon">
  <div class="env-wrap">
    <div class="env-body"></div>
    <div class="env-flap"></div>
    <div class="env-btm"></div>
    <div class="env-l"></div>
    <div class="env-r"></div>
  </div>
  <span>💌</span>
</div>

<div id="letterModal">
  <div class="letter-paper" id="letterPaper">
    <button class="ltr-close" id="ltrClose">✕</button>
    <div class="ltr-title">Gửi đến em</div>
    <div class="ltr-hearts">🌸 💕 🌸</div>
    <div class="ltr-body">
      Chúc em có ngày lễ 8/3 trọn vẹn,<br>
      Chúc em luôn vui vẻ và hạnh phúc,<br>
      Chúc em mỗi ngày đều cười tươi.<br><br>
      <br>
      Mong là món quà nhỏ kia sẽ làm em vui,<br>
      Hẹn mỗi năm quà càng ngày càng bự hơn nhé<br>
    </div>
    <div class="ltr-hearts" style="margin-top:16px">💐 🌺 💐</div>
    <div class="ltr-sign">— From TrungKien</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
window.addEventListener('load', function() {

const IMAGE_PATHS = [
  'images/img1.png','images/img2.png','images/img3.png','images/img4.png',
  'images/img5.png','images/img6.png','images/img7.png','images/img8.png',
  'images/img9.png','images/img10.png','images/img11.png','images/img12.png',
];

const W = () => window.innerWidth;
const H = () => window.innerHeight;
let STATE = 0;

// ─── 2D CANVAS ───────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d', { alpha: false });
canvas.width = W(); canvas.height = H();

const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || W() < 800;
const NPART = isMobile ? 1200 : 3500;
const parts  = [];

class Pt {
  constructor() { this.reset(true); }
  reset(init) {
    this.x  = Math.random() * W();
    this.y  = init ? Math.random() * H() : -10;
    this.tx = this.x; this.ty = this.y;
    this.vx = (Math.random()-.5) * .45;
    this.vy = (Math.random()-.5) * .45;
    // FIX: bigger base radius for crisper text without more particles
    this.br = isMobile ? Math.random() * 2.2 + 1.0 : Math.random() * 1.6 + 0.8;
    this.a  = Math.random() * .65 + .2;
    this.ad = Math.random() > .5 ? 1 : -1;
    this.as = Math.random() * .012 + .004;
    this.h  = Math.random() * 55 + 295;
    this.ph = Math.random() * Math.PI * 2;
    this.morphing = false;
    this.atTarget = false;
  }
  update(t) {
    if (this.morphing) {
      const dx = this.tx - this.x, dy = this.ty - this.y;
      // FIX: faster convergence = tighter letter shapes
      this.x += dx * .10; this.y += dy * .10;
      this.atTarget = (dx*dx + dy*dy) < 1.0;
    } else {
      this.atTarget = false;
      this.x += this.vx + Math.sin(t*.0009 + this.ph) * .28;
      this.y += this.vy + Math.cos(t*.0008 + this.ph*1.4) * .22;
      if (this.x < -5)    this.x = W()+5;
      if (this.x > W()+5) this.x = -5;
      if (this.y < -5)    this.y = H()+5;
      if (this.y > H()+5) this.y = -5;
    }
    this.a += this.ad * this.as;
    if (this.a > .95) { this.a = .95; this.ad = -1; }
    if (this.a < .05) { this.a = .05; this.ad =  1; }
  }
  draw() {
    if (isMobile) {
      // FIX: on mobile, use solid white when morphing for max crispness
      if (this.morphing && this.atTarget) {
        ctx.fillStyle = `rgba(255,255,255,${Math.min(this.a + 0.4, 1)})`;
      } else {
        ctx.fillStyle = `rgba(255,105,180,${this.a})`;
      }
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.br, 0, Math.PI*2);
      ctx.fill();
      return;
    }

    if (this.morphing && this.atTarget) {
      // FIX: solid bright dot at target — no gradient blur, pure crisp pixel
      ctx.save();
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = Math.min(this.a + 0.4, 1);
      // White core with pink halo
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.br * 1.2, 0, Math.PI*2);
      ctx.fill();
      // tiny pink center spark
      ctx.globalAlpha = 1;
      ctx.fillStyle = `hsl(${this.h},100%,90%)`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.br * 0.45, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    } else if (this.morphing) {
      // traveling toward target: soft glow but smaller radius so letters stay sharp
      const gr = this.br * 2.5;
      const g  = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, gr);
      g.addColorStop(0,  `hsla(${this.h},100%,92%,1)`);
      g.addColorStop(.4, `hsla(${this.h},100%,75%,.6)`);
      g.addColorStop(1,  `hsla(${this.h},100%,60%,0)`);
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = this.a * 0.7;
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(this.x, this.y, gr, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    } else {
      // idle firefly
      const gr = this.br * 5;
      const g  = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, gr);
      g.addColorStop(0,   `hsla(${this.h},100%,85%,1)`);
      g.addColorStop(.35, `hsla(${this.h},100%,70%,.55)`);
      g.addColorStop(1,   `hsla(${this.h},100%,60%,0)`);
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = this.a;
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(this.x, this.y, gr, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  }
}
for (let i = 0; i < NPART; i++) parts.push(new Pt());

window.addEventListener('resize', () => {
  canvas.width = W(); canvas.height = H();
  offC.width = W(); offC.height = H();
});

const offC   = document.createElement('canvas');
const offCtx = offC.getContext('2d');
offC.width = W(); offC.height = H();

function sampleText(text, maxPts) {
  const SCALE = 3; // FIX: higher scale = finer sampling = crisper letters
  offC.width  = W() * SCALE;
  offC.height = H() * SCALE;
  offCtx.clearRect(0, 0, offC.width, offC.height);
  offCtx.scale(SCALE, SCALE);
  const mobile   = W() < 600;
  const fontSize = mobile
    ? Math.min(W() / (text.length * .50 + .3), H() / 5, 72)
    : Math.min(W() / (text.length * .42 + .2), H() / 4, 110);
  offCtx.textAlign    = 'center';
  offCtx.textBaseline = 'middle';
  offCtx.font = `900 ${fontSize}px Georgia,serif`;
  const words = text.split(' ');
  const maxW  = W() * .88;
  const lines = [];
  let   line  = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (offCtx.measureText(test).width > maxW && line) { lines.push(line); line = w; }
    else line = test;
  }
  lines.push(line);
  const lh = fontSize * 1.5;
  const sy = H()/2 - (lines.length-1)*lh/2;
  lines.forEach((l, i) => {
    offCtx.fillStyle = '#fff';
    offCtx.fillText(l, W()/2, sy + i * lh);
  });
  offCtx.setTransform(1,0,0,1,0,0);
  const id   = offCtx.getImageData(0, 0, offC.width, offC.height).data;
  const pts  = [];
  // FIX: step=3 on 3x canvas = 1px effective spacing — very dense sampling
  const step = 3;
  for (let y = 0; y < offC.height; y += step)
    for (let x = 0; x < offC.width; x += step)
      if (id[(y * offC.width + x) * 4 + 3] > 100)
        pts.push({ x: x / SCALE, y: y / SCALE });
  for (let i = pts.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [pts[i], pts[j]] = [pts[j], pts[i]];
  }
  return pts.slice(0, maxPts);
}

function morphText(text) {
  const pts = sampleText(text, NPART);
  parts.forEach((p, i) => {
    p.morphing = true; p.atTarget = false;
    if (i < pts.length) { p.tx = pts[i].x; p.ty = pts[i].y; }
    else {
      const ang = Math.random()*Math.PI*2;
      p.tx = W()/2 + Math.cos(ang)*W()*.75;
      p.ty = H()/2 + Math.sin(ang)*H()*.75;
    }
  });
}

function disperse() {
  parts.forEach(p => {
    p.morphing = true;
    const ang = Math.random()*Math.PI*2, dr = .2 + Math.random()*.7;
    p.tx = W()/2 + Math.cos(ang)*W()*dr;
    p.ty = H()/2 + Math.sin(ang)*H()*dr;
  });
}

const MSGS = ["À ờm thì...","Hôm nay là 8.3 nhỉ","Anh có món quà nho nhỏ này","Có chút sến súa nma mong em thấy vui"];
let msgIdx = 0;
function runMessages() {
  if (msgIdx >= MSGS.length) { disperse(); setTimeout(showSphereStage, 1500); return; }
  morphText(MSGS[msgIdx++]);
  setTimeout(() => { disperse(); setTimeout(runMessages, 1050); }, 5500);
}

// FIX: slightly faster fade when morphing so old positions clear fast = sharper edges
let raf2d, t2 = 0;
function loop2D() {
  raf2d = requestAnimationFrame(loop2D);
  t2++;
  const fadeAlpha = STATE === 1 ? 0.30 : 0.18;
  ctx.fillStyle = `rgba(0,0,0,${fadeAlpha})`;
  ctx.fillRect(0, 0, W(), H());
  parts.forEach(p => { p.update(t2); p.draw(); });
}
loop2D();

// ─── HOLD BUTTON ──────────────────────────────────
const holdBtn  = document.getElementById('holdBtn');
const ring     = document.querySelector('circle.progress');
const CIRC     = 2 * Math.PI * 60;
ring.style.strokeDasharray  = CIRC;
ring.style.strokeDashoffset = CIRC;

let holdAnim = null, isHolding = false, holdCompleted = false;

function startHold(e) {
  e.preventDefault();
  e.stopPropagation();
  if (STATE !== 0 || isHolding || holdCompleted) return;
  isHolding = true;
  holdAnim = gsap.to(ring, { strokeDashoffset:0, duration:2, ease:'none', onComplete: onHoldComplete });
}
function cancelHold() {
  if (holdCompleted || !isHolding) return;
  isHolding = false;
  holdAnim && holdAnim.kill();
  gsap.to(ring, { strokeDashoffset:CIRC, duration:.5, ease:'power2.out' });
}
function onHoldComplete() {
  holdCompleted = true;
  isHolding = false;
  STATE = 1;
  document.removeEventListener('mouseup',   cancelHold);
  document.removeEventListener('touchend',  cancelHold);

  gsap.to(holdBtn, { opacity:0, scale:.4, duration:.6, ease:'back.in',
    onComplete:()=>{ holdBtn.style.display='none'; }
  });

  const db = document.getElementById('dateBadge');
  db.style.display = 'block';
  gsap.fromTo(db, { opacity:0, y:-10 }, { opacity:0.6, y:0, duration:1 });

  // FIX: music — create AudioContext on the SAME gesture stack then play
  tryPlayMusic();

  setTimeout(runMessages, 500);
}

holdBtn.addEventListener('mousedown',  startHold, { passive:false });
holdBtn.addEventListener('touchstart', startHold, { passive:false });
document.addEventListener('mouseup',   cancelHold);
document.addEventListener('touchend',  cancelHold);

// ─── DUST CANVAS ─────────────────────────────────
const dustCanvas = document.getElementById('dustCanvas');
const dCtx = dustCanvas.getContext('2d');
dustCanvas.width = W(); dustCanvas.height = H();
window.addEventListener('resize', () => { dustCanvas.width = W(); dustCanvas.height = H(); buildSoftSprite(); });

let softSprite = null;
const SPRITE_SIZE = 32;
function buildSoftSprite() {
  const sc = document.createElement('canvas');
  sc.width = SPRITE_SIZE; sc.height = SPRITE_SIZE;
  const sx = sc.getContext('2d');
  const cx = SPRITE_SIZE/2, cy = SPRITE_SIZE/2;
  const gr = sx.createRadialGradient(cx,cy,0,cx,cy,SPRITE_SIZE/2);
  gr.addColorStop(0,   'rgba(255,200,230,1)');
  gr.addColorStop(0.25,'rgba(255,150,200,0.7)');
  gr.addColorStop(0.55,'rgba(255,105,180,0.3)');
  gr.addColorStop(1,   'rgba(255,80,160,0)');
  sx.fillStyle = gr;
  sx.beginPath(); sx.arc(cx,cy,SPRITE_SIZE/2,0,Math.PI*2); sx.fill();
  softSprite = sc;
}
buildSoftSprite();

const DUST_COUNT = isMobile ? 80 : 160;
const dustParticles = [];
class DustPt {
  constructor(immediate) { this.init(immediate); }
  init(immediate) {
    this.x = Math.random()*W();
    this.y = immediate ? Math.random()*H() : H()+Math.random()*60;
    this.size = Math.random()*10+4;
    this.a = 0;
    this.maxA = Math.random()*0.45+0.1;
    this.vy = -(Math.random()*0.35+0.08);
    this.vx = (Math.random()-0.5)*0.22;
    this.wobbleAmp  = Math.random()*0.8+0.2;
    this.wobbleFreq = Math.random()*0.02+0.005;
    this.wobbleOff  = Math.random()*Math.PI*2;
    this.age = 0;
    this.life = Math.random()*420+200;
    this.hue = Math.random()*60+300;
  }
  update(frame) {
    this.age++;
    this.x += this.vx + Math.sin(frame*this.wobbleFreq+this.wobbleOff)*this.wobbleAmp;
    this.y += this.vy;
    const fadeIn  = Math.min(1, this.age/40);
    const fadeOut = Math.max(0, 1-Math.max(0, this.age-(this.life-60))/60);
    this.a = this.maxA*fadeIn*fadeOut;
  }
  get dead() { return this.age>=this.life||this.y<-this.size*2; }
  draw() {
    if (!softSprite) return;
    dCtx.save();
    dCtx.globalAlpha = this.a;
    dCtx.globalCompositeOperation = 'lighter';
    const s = this.size*2;
    dCtx.drawImage(softSprite, this.x-s/2, this.y-s/2, s, s);
    dCtx.restore();
  }
}
for (let i=0;i<DUST_COUNT;i++) dustParticles.push(new DustPt(true));

const burstParticles = [];
class BurstPt {
  constructor(x,y) {
    const ang = Math.random()*Math.PI*2;
    const spd = Math.random()*4.5+1.5;
    this.x = x+(Math.random()-0.5)*80;
    this.y = y+(Math.random()-0.5)*80;
    this.vx = Math.cos(ang)*spd;
    this.vy = Math.sin(ang)*spd-1.5;
    this.size = Math.random()*14+5;
    this.a = Math.random()*0.7+0.3;
    this.life = Math.random()*80+40;
    this.age = 0;
    this.drag = 0.96;
    this.gravity = 0.04;
  }
  update() {
    this.age++; this.vx*=this.drag;
    this.vy=this.vy*this.drag+this.gravity;
    this.x+=this.vx; this.y+=this.vy;
    this.a=(1-this.age/this.life)*0.8;
    this.size*=0.985;
  }
  get dead() { return this.age>=this.life||this.size<1; }
  draw() {
    if (!softSprite) return;
    dCtx.save();
    dCtx.globalAlpha = Math.max(0,this.a);
    dCtx.globalCompositeOperation = 'lighter';
    const s=this.size*2;
    dCtx.drawImage(softSprite,this.x-s/2,this.y-s/2,s,s);
    dCtx.restore();
  }
}
function emitBurst(cx,cy,count) {
  for(let i=0;i<count;i++) burstParticles.push(new BurstPt(cx,cy));
}
function triggerSphereExplosion() {
  const cx=W()/2, cy=H()/2;
  emitBurst(cx,cy,isMobile?80:180);
  setTimeout(()=>emitBurst(cx,cy,isMobile?40:90),200);
  setTimeout(()=>emitBurst(cx,cy,isMobile?30:60),450);
}

let dustFrame=0;
function loopDust() {
  requestAnimationFrame(loopDust);
  dustFrame++;
  dCtx.clearRect(0,0,W(),H());
  for(let i=dustParticles.length-1;i>=0;i--) {
    dustParticles[i].update(dustFrame);
    if(dustParticles[i].dead) dustParticles.splice(i,1,new DustPt(false));
    else dustParticles[i].draw();
  }
  for(let i=burstParticles.length-1;i>=0;i--) {
    burstParticles[i].update();
    if(burstParticles[i].dead) burstParticles.splice(i,1);
    else burstParticles[i].draw();
  }
}

// ─── THREE.JS ─────────────────────────────────────
const threeCanvas = document.getElementById('threeCanvas');
let renderer, scene, camera, sphereGroup;
let meshes = [];

function makeProceduralTex(i) {
  const pc=document.createElement('canvas');
  pc.width=256; pc.height=320;
  const c=pc.getContext('2d');
  const pals=[
    ['#ff69b4','#ff1493','#c71585'],['#ff8fab','#e91e8c','#ad1457'],
    ['#ffb3c6','#ff4d94','#c2185b'],['#f48fb1','#f06292','#e91e8c'],
    ['#fce4ec','#f48fb1','#e91e63'],['#ff80ab','#ff4081','#f50057'],
    ['#ff6b9d','#c9184a','#ff0a54'],['#ff85a1','#ff5c8a','#f72585'],
    ['#ffa0be','#e75480','#c71585'],['#ffb6c1','#ff69b4','#ff1493'],
    ['#db7093','#c71585','#ff69b4'],['#ff91af','#ff4081','#e91e63'],
  ];
  const pal=pals[i%pals.length];
  const g=c.createLinearGradient(0,0,256,320);
  g.addColorStop(0,pal[0]); g.addColorStop(.5,pal[1]); g.addColorStop(1,pal[2]);
  c.fillStyle=g; c.roundRect(0,0,256,320,22); c.fill();
  c.fillStyle='rgba(255,255,255,.07)';
  for(let k=0;k<5;k++){c.beginPath();c.arc(Math.random()*256,Math.random()*320,Math.random()*55+15,0,Math.PI*2);c.fill();}
  const em=['💕','🌸','💝','🌺','💖','✨','🌷','💗','🎀','💞','🌹','💓'];
  c.font='bold 68px serif'; c.textAlign='center'; c.textBaseline='middle';
  c.fillStyle='rgba(255,255,255,.5)'; c.fillText(em[i%em.length],128,160);
  c.strokeStyle='rgba(255,255,255,.45)'; c.lineWidth=6;
  c.roundRect(5,5,246,310,19); c.stroke();
  return pc;
}

function loadTextures(count,cb) {
  const texs=new Array(count);
  if(!IMAGE_PATHS.length){for(let i=0;i<count;i++)texs[i]=new THREE.CanvasTexture(makeProceduralTex(i));return cb(texs);}
  let done=0;
  const loader=new THREE.TextureLoader();
  for(let i=0;i<count;i++){
    const path=IMAGE_PATHS[i%IMAGE_PATHS.length];
    loader.load(path,t=>{texs[i]=t;if(++done===count)cb(texs);},undefined,()=>{texs[i]=new THREE.CanvasTexture(makeProceduralTex(i));if(++done===count)cb(texs);});
  }
}

function initThree() {
  renderer=new THREE.WebGLRenderer({canvas:threeCanvas,antialias:true,alpha:false});
  renderer.setSize(W(),H()); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setClearColor(0x06000d,1);
  scene=new THREE.Scene(); scene.background=new THREE.Color(0x06000d);
  camera=new THREE.PerspectiveCamera(55,W()/H(),.1,300);
  camera.position.z=7.5;
  addStars();
  window.addEventListener('resize',()=>{camera.aspect=W()/H();camera.updateProjectionMatrix();renderer.setSize(W(),H());});
}

function addStars() {
  const geo=new THREE.BufferGeometry(),v=[];
  for(let i=0;i<1500;i++)v.push((Math.random()-.5)*250,(Math.random()-.5)*250,(Math.random()-.5)*250);
  geo.setAttribute('position',new THREE.Float32BufferAttribute(v,3));
  const colors=[];
  for(let i=0;i<1500;i++){if(Math.random()<.3){colors.push(1,.7,.85);}else{colors.push(.95,.9,1);}}
  geo.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));
  scene.add(new THREE.Points(geo,new THREE.PointsMaterial({size:.18,vertexColors:true,transparent:true,opacity:.75})));
}

function showSphereStage() {
  STATE=2;
  cancelAnimationFrame(raf2d);
  gsap.to(canvas,{opacity:0,duration:1.5,onComplete:()=>canvas.style.display='none'});
  threeCanvas.style.display='block';
  dustCanvas.style.display='block';
  loopDust();
  gsap.to('#dateBadge',{opacity:.45,duration:.5});
  initThree();
  const count=IMAGE_PATHS.length>0?Math.max(IMAGE_PATHS.length,36):48;
  loadTextures(count,textures=>{
    buildSphere(textures);
    loopThree();
    setTimeout(()=>document.getElementById('hintSphere').style.display='block',2200);
  });
}

function buildSphere(textures) {
  const R=2.9, N=textures.length;
  const iW=Math.min(1.05,W()/530);
  const iH=iW*1.35;
  meshes=[]; sphereGroup=new THREE.Group();
  const goldenAngle=Math.PI*(3-Math.sqrt(5));
  for(let i=0;i<N;i++){
    const yN=1-(i/(N-1))*2;
    const r=Math.sqrt(Math.max(0,1-yN*yN));
    const th=goldenAngle*i;
    const nx=Math.cos(th)*r, nz=Math.sin(th)*r;
    const pos=new THREE.Vector3(nx*R,yN*R,nz*R);
    const mat=new THREE.MeshBasicMaterial({map:textures[i],side:THREE.DoubleSide,transparent:true,opacity:0});
    const mesh=new THREE.Mesh(new THREE.PlaneGeometry(iW,iH),mat);
    mesh.position.copy(pos); mesh.lookAt(0,0,0); mesh.rotateY(Math.PI);
    const glowM=new THREE.MeshBasicMaterial({color:0xff69b4,transparent:true,opacity:0,side:THREE.DoubleSide});
    const glowP=new THREE.Mesh(new THREE.PlaneGeometry(iW+.09,iH+.09),glowM);
    glowP.position.z=-.015; mesh.add(glowP);
    mesh.userData={origPos:pos.clone(),glow:glowP,glowMat:glowM};
    mesh.position.set((Math.random()-.5)*24,(Math.random()-.5)*24,(Math.random()-.5)*24);
    sphereGroup.add(mesh); meshes.push(mesh);
    const d=Math.random()*2;
    gsap.to(mesh.position,{x:pos.x,y:pos.y,z:pos.z,duration:2.2+Math.random()*.9,delay:d,ease:'power3.out'});
    gsap.to(mat,{opacity:1,duration:1.2,delay:d});
    gsap.to(glowM,{opacity:.22,duration:1.2,delay:d});
  }
  scene.add(sphereGroup);
}

let exploded=false;
function explodeSphere() {
  if(exploded||STATE!==2)return;
  exploded=true; STATE=3;
  document.getElementById('hintSphere').style.display='none';
  triggerSphereExplosion();
  meshes.forEach(m=>{
    const wp=new THREE.Vector3(); m.getWorldPosition(wp);
    const wq=new THREE.Quaternion(); m.getWorldQuaternion(wq);
    sphereGroup.remove(m); scene.add(m);
    m.position.copy(wp); m.quaternion.copy(wq);
  });
  scene.remove(sphereGroup);
  meshes.forEach(m=>{
    const dir=m.userData.origPos.clone().normalize();
    const target={x:dir.x*(5+Math.random()*10)+(Math.random()-.5)*6,y:dir.y*(5+Math.random()*10)+(Math.random()-.5)*6,z:dir.z*2.5-1-Math.random()*14};
    const scl=.5+Math.random()*1.1, dl=Math.random()*.4;
    gsap.to(m.position,{...target,duration:1.7+Math.random()*.8,delay:dl,ease:'power2.out'});
    gsap.to(m.scale,{x:scl,y:scl,z:scl,duration:1.5,delay:dl});
    gsap.to(m.rotation,{x:(Math.random()-.5)*.5,y:(Math.random()-.5)*.5,z:(Math.random()-.5)*.35,duration:1.8,delay:dl,ease:'power1.out'});
    gsap.to(m.material,{opacity:.9,duration:1,delay:dl});
    gsap.to(m.userData.glowMat,{opacity:.35,duration:1,delay:dl});
  });
  setTimeout(()=>document.getElementById('hintDrag').style.display='block',1100);
  setTimeout(()=>{
    const li=document.getElementById('letterIcon');
    li.style.display='block';
    gsap.from(li,{opacity:0,scale:0,duration:.9,ease:'back.out(1.7)'});
  },1500);
}

let drag={on:false,x0:0,y0:0,vx:0,vy:0};
let rotX=0,rotY=0;
function onDragStart(x,y){if(STATE!==3)return;drag.on=true;drag.x0=x;drag.y0=y;drag.vx=0;drag.vy=0;}
function onDragMove(x,y){
  if(!drag.on||STATE!==3)return;
  drag.vx=(x-drag.x0)*.006; drag.vy=(y-drag.y0)*.006;
  drag.x0=x; drag.y0=y;
  rotY+=drag.vx; rotX+=drag.vy;
  rotX=Math.max(-Math.PI/2,Math.min(Math.PI/2,rotX));
}
function onDragEnd(){drag.on=false;}
threeCanvas.addEventListener('mousedown',e=>onDragStart(e.clientX,e.clientY));
threeCanvas.addEventListener('mousemove',e=>onDragMove(e.clientX,e.clientY));
threeCanvas.addEventListener('mouseup',onDragEnd);
threeCanvas.addEventListener('touchstart',e=>{if(STATE===3)onDragStart(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
threeCanvas.addEventListener('touchmove',e=>{e.preventDefault();if(STATE===3)onDragMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
threeCanvas.addEventListener('touchend',onDragEnd);
threeCanvas.addEventListener('click',()=>{if(STATE===2)explodeSphere();});
threeCanvas.addEventListener('touchend',e=>{if(STATE===2){e.preventDefault();explodeSphere();}},{passive:false});

let threeRaf, driftT=0;
function loopThree() {
  threeRaf=requestAnimationFrame(loopThree);
  driftT++;
  if(STATE===2&&sphereGroup){
    sphereGroup.rotation.y+=.0045;
    sphereGroup.rotation.x=Math.sin(driftT*.0025)*.06;
    sphereGroup.rotation.z=Math.sin(driftT*.002)*.015;
  }
  if(STATE===3){
    if(!drag.on){drag.vx*=.93;drag.vy*=.93;rotY+=drag.vx;rotX+=drag.vy;rotX=Math.max(-Math.PI/2,Math.min(Math.PI/2,rotX));}
    const cosX=Math.cos(rotX),sinX=Math.sin(rotX),cosY=Math.cos(rotY),sinY=Math.sin(rotY);
    meshes.forEach(m=>{
      if(!m.userData.scatterSet){
        m.userData.scatterPos=m.position.clone();
        m.userData.scatterSet=true;
        m.userData.driftZ=-(Math.random()*.003+.0005);
      }
      m.userData.scatterPos.z+=m.userData.driftZ;
      if(m.userData.scatterPos.z<-30)m.userData.scatterPos.z=12;
      const sp=m.userData.scatterPos;
      const x1=sp.x*cosY+sp.z*sinY, z1=-sp.x*sinY+sp.z*cosY;
      const y1=sp.y*cosX-z1*sinX,   z2=sp.y*sinX+z1*cosX;
      m.position.set(x1,y1,z2);
    });
  }
  renderer.render(scene,camera);
}

// ─── LETTER ───────────────────────────────────────
const letterIcon=document.getElementById('letterIcon');
const letterModal=document.getElementById('letterModal');
const letterPaper=document.getElementById('letterPaper');
const ltrClose=document.getElementById('ltrClose');
function openLetter(){
  letterModal.classList.add('show');
  gsap.fromTo(letterPaper,{scale:0,rotateX:40,opacity:0,y:80},{scale:1,rotateX:0,opacity:1,y:0,duration:.9,ease:'back.out(1.5)'});
}
function closeLetter(){
  gsap.to(letterPaper,{scale:0,rotateX:-30,opacity:0,y:80,duration:.5,ease:'back.in',onComplete:()=>letterModal.classList.remove('show')});
}
letterIcon.addEventListener('click',openLetter);
letterIcon.addEventListener('touchend',e=>{e.preventDefault();openLetter();},{passive:false});
ltrClose.addEventListener('click',closeLetter);
letterModal.addEventListener('click',e=>{if(e.target===letterModal)closeLetter();});

// ─── MUSIC (fixed) ────────────────────────────────
// FIX: Don't use autoStartMusic with once:true — that steals the gesture token.
// Instead, create Audio and call play() directly inside the gesture handler (onHoldComplete).
let audioObj = null;
let audioReady = false;

function tryPlayMusic() {
  // Called directly from gesture handler — browser allows autoplay here
  if (audioObj) return;
  audioObj = new Audio('music.mp3');
  audioObj.loop = true;
  audioObj.volume = 0.5;
  const playPromise = audioObj.play();
  if (playPromise !== undefined) {
    playPromise
      .then(() => { musicBtn.classList.add('playing'); audioReady = true; })
      .catch(() => {
        // Fallback: user must tap music button manually
        audioReady = false;
      });
  }
}

function toggleMusic() {
  if (!audioObj) {
    // First tap on music button
    audioObj = new Audio('music.mp3');
    audioObj.loop = true;
    audioObj.volume = 0.5;
    audioObj.play().then(()=>{musicBtn.classList.add('playing');musicBtn.classList.remove('muted');});
    return;
  }
  if (!audioObj.paused) {
    audioObj.pause();
    musicBtn.classList.add('muted');
    musicBtn.classList.remove('playing');
  } else {
    audioObj.play().then(()=>{musicBtn.classList.remove('muted');musicBtn.classList.add('playing');});
  }
}

const musicBtn = document.getElementById('musicBtn');
musicBtn.addEventListener('click', toggleMusic);
musicBtn.addEventListener('touchend', e=>{e.preventDefault(); toggleMusic();}, {passive:false});

}); // end window.onload
</script>
